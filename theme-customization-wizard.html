<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Theme Customization Wizard</title>
    <link rel="stylesheet" href="css/axiom.css">
</head>
<body class="axiom-body">
    <header class="main" data-component="mobile-navbar">
        <nav>
            <a href="index.html" class="brand">[Ax<span class="primary">01</span>]</a>
            <ul class="links">
                <li><a href="index.html#philosophy">Philosophy</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#components">Components</a></li>
                <li><a href="index.html#get-started">Get Started</a></li>
            </ul>
            <div class="actions">
                <a href="https://github.com/Sol-Roth-Media/axiom" class="github" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="theme-wizard">
            <header>
                <h1>Theme Customization Wizard</h1>
                <p>Visually customize the Axiom theme to match your brand.</p>
            </header>

            <div class="wizard-layout">
                <aside class="wizard-controls">
                    <h2>Controls</h2>
                    <div class="control-group">
                        <label for="primary-color">Primary Color</label>
                        <input type="color" id="primary-color" value="#007bff">
                    </div>
                    <div class="control-group">
                        <label for="secondary-color">Secondary Color</label>
                        <input type="color" id="secondary-color" value="#6c757d">
                    </div>
                    <div class="control-group">
                        <label for="surface-color">Surface Color</label>
                        <input type="color" id="surface-color" value="#ffffff">
                    </div>
                    <div class="control-group">
                        <label for="on-surface-color">On Surface Color</label>
                        <input type="color" id="on-surface-color" value="#212529">
                    </div>
                    <div class="control-group">
                        <label for="space-unit">Space Unit (rem)</label>
                        <input type="number" id="space-unit" value="1" step="0.1" min="0.5" max="2">
                    </div>
                    <div class="control-group">
                        <label for="border-radius-large">Border Radius (px)</label>
                        <input type="number" id="border-radius-large" value="8" step="1" min="0" max="20">
                    </div>
                    <div class="control-group">
                        <label for="shadow-medium">Shadow (e.g., 0 0.25rem 0.75rem rgba(0,0,0,0.07))</label>
                        <input type="text" id="shadow-medium" value="0 0.25rem 0.75rem rgba(0, 0, 0, 0.07)">
                    </div>
                    <div class="control-group">
                        <label for="font-size-base">Base Font Size (rem)</label>
                        <input type="number" id="font-size-base" value="1" step="0.05" min="0.8" max="1.2">
                    </div>
                    <div class="control-group">
                        <label for="line-height-base">Base Line Height</label>
                        <input type="number" id="line-height-base" value="1.7" step="0.1" min="1.2" max="2.0">
                    </div>
                    <div class="control-group">
                        <label for="font-family-sans">Font Family</label>
                        <input type="text" id="font-family-sans" value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol'">
                    </div>
                    <div class="control-group">
                        <button id="export-css">Export CSS</button>
                    </div>
                </aside>

                <div class="wizard-preview">
                    <h2>Preview</h2>
                    <div class="preview-content">
                        <div class="card">
                            <h3>Card Title</h3>
                            <p>This is a sample card component.</p>
                            <button class="primary">Primary Button</button>
                            <button class="secondary">Secondary Button</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="exported-css-container">
                <h2>Exported CSS</h2>
                <textarea id="exported-css" readonly></textarea>
            </div>
        </section>
    </main>

    <script src="js/axiom.js" type="module"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const primaryColorInput = document.getElementById('primary-color');
            const secondaryColorInput = document.getElementById('secondary-color');
            const surfaceColorInput = document.getElementById('surface-color');
            const onSurfaceColorInput = document.getElementById('on-surface-color');
            const spaceUnitInput = document.getElementById('space-unit');
            const borderRadiusLargeInput = document.getElementById('border-radius-large');
            const shadowMediumInput = document.getElementById('shadow-medium');
            const fontSizeBaseInput = document.getElementById('font-size-base');
            const lineHeightBaseInput = document.getElementById('line-height-base');
            const fontFamilySansInput = document.getElementById('font-family-sans');
            const exportCssButton = document.getElementById('export-css');
            const exportedCssTextarea = document.getElementById('exported-css');
            const root = document.documentElement; // Target the root element for global CSS variables

            function updatePreview() {
                root.style.setProperty('--a-color-primary', primaryColorInput.value);
                root.style.setProperty('--a-color-on-primary', '#ffffff'); // Assuming white text on primary
                root.style.setProperty('--a-color-secondary', secondaryColorInput.value);
                root.style.setProperty('--a-color-on-secondary', '#ffffff'); // Assuming white text on secondary
                root.style.setProperty('--a-color-surface', surfaceColorInput.value);
                root.style.setProperty('--a-color-on-surface', onSurfaceColorInput.value);
                root.style.setProperty('--a-space-unit', `${spaceUnitInput.value}rem`);
                root.style.setProperty('--a-border-radius-large', `${borderRadiusLargeInput.value}px`);
                root.style.setProperty('--a-shadow-medium', shadowMediumInput.value);
                root.style.setProperty('--a-font-size-base', `${fontSizeBaseInput.value}rem`);
                root.style.setProperty('--a-line-height-base', lineHeightBaseInput.value);
                root.style.setProperty('--a-font-family-sans', fontFamilySansInput.value);
            }

            function exportCss() {
                const css = `
:root {
    --a-color-primary: ${primaryColorInput.value};
    --a-color-on-primary: #ffffff;
    --a-color-secondary: ${secondaryColorInput.value};
    --a-color-on-secondary: #ffffff;
    --a-color-surface: ${surfaceColorInput.value};
    --a-color-on-surface: ${onSurfaceColorInput.value};
    --a-space-unit: ${spaceUnitInput.value}rem;
    --a-border-radius-large: ${borderRadiusLargeInput.value}px;
    --a-shadow-medium: ${shadowMediumInput.value};
    --a-font-size-base: ${fontSizeBaseInput.value}rem;
    --a-line-height-base: ${lineHeightBaseInput.value};
    --a-font-family-sans: ${fontFamilySansInput.value};
}
                `;
                exportedCssTextarea.value = css.trim();
            }

            primaryColorInput.addEventListener('input', updatePreview);
            secondaryColorInput.addEventListener('input', updatePreview);
            surfaceColorInput.addEventListener('input', updatePreview);
            onSurfaceColorInput.addEventListener('input', updatePreview);
            spaceUnitInput.addEventListener('input', updatePreview);
            borderRadiusLargeInput.addEventListener('input', updatePreview);
            shadowMediumInput.addEventListener('input', updatePreview);
            fontSizeBaseInput.addEventListener('input', updatePreview);
            lineHeightBaseInput.addEventListener('input', updatePreview);
            fontFamilySansInput.addEventListener('input', updatePreview);
            exportCssButton.addEventListener('click', exportCss);

            // Initial update to reflect default values
            updatePreview();
        });
</body>
</html>
