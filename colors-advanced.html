<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Advanced Colors</title>
    <link rel="stylesheet" href="css/axiom.css">
</head>
<body class="axiom-body">
    <header class="main" data-component="mobile-navbar">
        <nav>
            <a href="index.html" class="brand">[Ax<span class="primary">01</span>]</a>
            <ul class="links">
                <li><a href="index.html#philosophy">Philosophy</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#components">Components</a></li>
                <li><a href="index.html#get-started">Get Started</a></li>
            </ul>
            <div class="actions">
                <a href="https://github.com/Sol-Roth-Media/axiom" class="github" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="advanced-colors">
            <header>
                <h1>Advanced Color System</h1>
                <p>A deep dive into the Axiom color palette and theming capabilities.</p>
            </header>

            <div id="color-palette-display"></div>

        </section>
    </main>

    <script src="js/axiom.js" type="module"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const colorPaletteDisplay = document.getElementById('color-palette-display');
            const style = getComputedStyle(document.documentElement);
            let colorVars = [];

            for (let i = 0; i < document.styleSheets.length; i++) {
                try {
                    const sheet = document.styleSheets[i];
                    if (sheet.href && sheet.href.includes('axiom.css')) {
                        const rules = sheet.cssRules;
                        for (let j = 0; j < rules.length; j++) {
                            const rule = rules[j];
                            if (rule.selectorText === ':root' || rule.selectorText === 'html') {
                                const cssText = rule.cssText.split('{')[1].split('}')[0].trim();
                                const declarations = cssText.split(';');
                                declarations.forEach(declaration => {
                                    if (declaration.includes('--a-color')) {
                                        const parts = declaration.split(':');
                                        if (parts.length === 2) {
                                            const name = parts[0].trim();
                                            const value = parts[1].trim();
                                            colorVars.push({ name, value });
                                        }
                                    }
                                });
                            }
                        }
                    }
                } catch (e) {
                    console.warn('Could not read CSS rules from stylesheet', e);
                }
            }

            let html = '';
            colorVars.forEach(({ name, value }) => {
                const colorValue = style.getPropertyValue(name).trim();
                html += `
                    <div class="color-swatch-card">
                        <div class="swatch" style="background-color: ${colorValue}"></div>
                        <div class="swatch-info">
                            <h3>${name}</h3>
                            <p>${colorValue}</p>
                        </div>
                    </div>
                `;
            });

            colorPaletteDisplay.innerHTML = `<div class="color-grid">${html}</div>`;
        });
    </script>
</body>
</html>
