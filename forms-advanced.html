<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Advanced Forms</title>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous"/>
</head>
<body class="axiom-body">

    <header class="main">
        <nav>
            <a href="index.html" class="brand">[Ax<span class="primary">01</span>]</a>
            <ul class="links">
                <li><a href="index.html#philosophy">Philosophy</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#components">Components</a></li>
            </ul>
            <div class="actions">
                <a href="https://github.com/Sol-Roth-Media/axiom" class="github" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Advanced Forms</h1>
                <p>Showcasing complex form layouts, validation, and multi-step processes.</p>
            </div>
        </section>

        <section>
            <div class="container">
                <div class="card" data-component="multi-step-form">
                    <div class="multi-step-header">
                        <div class="step active" data-step="1">
                            <div class="step-number">1</div>
                            <div class="step-title">Account Setup</div>
                        </div>
                        <div class="step" data-step="2">
                            <div class="step-number">2</div>
                            <div class="step-title">Personal Details</div>
                        </div>
                        <div class="step" data-step="3">
                            <div class="step-number">3</div>
                            <div class="step-title">Confirmation</div>
                        </div>
                    </div>

                    <form id="multi-step-form">
                        <div class="form-step active" data-step="1">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required>
                                <div class="error-message"></div>
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" required minlength="8">
                                <div class="error-message"></div>
                            </div>
                        </div>

                        <div class="form-step" data-step="2">
                            <div class="form-group">
                                <label for="full-name">Full Name</label>
                                <input type="text" id="full-name" required>
                                <div class="error-message"></div>
                            </div>
                            <div class="form-group">
                                <label for="country">Country</label>
                                <select id="country" required>
                                    <option value="">Select a country</option>
                                    <option value="USA">United States</option>
                                    <option value="Canada">Canada</option>
                                    <option value="Mexico">Mexico</option>
                                </select>
                                <div class="error-message"></div>
                            </div>
                        </div>

                        <div class="form-step" data-step="3">
                            <h3>Confirm Your Details</h3>
                            <p>Please review your information before submitting.</p>
                            <div id="confirmation-details"></div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="button secondary" id="prev-btn" disabled>Previous</button>
                            <button type="button" class="button primary" id="next-btn">Next</button>
                            <button type="submit" class="button primary" id="submit-btn" style="display: none;">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="js/axiom.js" type="module"></script>
</body>
</html>
