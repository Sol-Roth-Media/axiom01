<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Forms Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>

    <div class="container">
        <h1>Forms Component</h1>

        <p>The forms component provides accessible and reusable form controls, with built-in validation and state management.</p>

        <h2>Example</h2>

        <form id="contact-form" novalidate>
            <div class="form-group">
                <label for="contact-name">Full Name <span class="required" aria-label="required">*</span></label>
                <input id="contact-name" name="name" type="text" required aria-describedby="name-error name-help">
                <div id="name-help" class="help-text">Enter your first and last name</div>
                <div id="name-error" class="error-message" role="alert" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label for="contact-email">Email <span class="required" aria-label="required">*</span></label>
                <input id="contact-email" name="email" type="email" required aria-describedby="email-error email-help">
                <div id="email-help" class="help-text">We'll use this to respond to your message</div>
                <div id="email-error" class="error-message" role="alert" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="4" aria-describedby="message-help"></textarea>
                <div id="message-help" class="help-text">Tell us more about your inquiry</div>
            </div>

            <button type="submit" class="button primary">Send Message</button>
        </form>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/forms.js"></script>
</body>
</html>
