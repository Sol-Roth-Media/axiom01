<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Drawer Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/drawer.css">
</head>
<body>

    <div class="container">
        <h1>Drawer Component</h1>

        <p>The drawer component is a sliding panel that can be used for navigation, forms, or other content.</p>

        <h2>Examples</h2>

        <button class="button" aria-controls="drawer-1">Open Drawer</button>

        <div id="drawer-1" class="drawer" hidden>
            <div class="drawer-header">
                <h2>Drawer Title</h2>
                <button class="button-icon drawer-close" aria-label="Close drawer">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="drawer-content">
                <p>This is the content of the drawer.</p>
                <a href="#">Link 1</a>
                <a href="#">Link 2</a>
                <button class="button">Button</button>
            </div>
        </div>
        <div class="drawer-backdrop"></div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/drawer.js"></script>
</body>
</html>
