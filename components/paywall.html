<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Paywall Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/paywall.css">
</head>
<body>

    <div class="container">
        <h1>Paywall Component</h1>

        <p>The paywall component is used to gate content and require an action to reveal it.</p>

        <div class="paywall">
            <div class="paywall-content">
                <p>This is some premium content that is hidden behind a paywall.</p>
            </div>
            <div class="paywall-gate">
                <h2>Unlock Premium Content</h2>
                <p>Subscribe to our newsletter to unlock this content.</p>
                <button class="button primary" data-paywall-unlock>Unlock</button>
            </div>
        </div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/paywall.js"></script>
</body>
</html>
