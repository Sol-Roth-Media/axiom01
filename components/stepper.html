<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Stepper Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/stepper.css">
</head>
<body>

    <div class="container">
        <h1>Stepper Component</h1>

        <p>The stepper component guides users through a multi-step process.</p>

        <h2>Example</h2>

        <div class="stepper">
            <div class="stepper-step active">
                <div class="step-number">1</div>
                <div class="step-line"></div>
            </div>
            <div class="stepper-step">
                <div class="step-number">2</div>
                <div class="step-line"></div>
            </div>
            <div class="stepper-step">
                <div class="step-number">3</div>
            </div>
        </div>

        <button class="button" data-stepper-prev>Previous</button>
        <button class="button" data-stepper-next>Next</button>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/stepper.js"></script>
</body>
</html>
