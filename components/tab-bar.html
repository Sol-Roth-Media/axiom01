<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Tab Bar Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/tab-bar.css">
</head>
<body>

    <div class="container">
        <h1>Tab Bar Component</h1>

        <p>The tab bar component provides a horizontal navigation bar for switching between different views or sections.</p>

        <h2>Example</h2>

        <div class="tab-bar" role="tablist">
            <button class="tab active" role="tab" aria-selected="true" tabindex="0">Tab 1</button>
            <button class="tab" role="tab" tabindex="-1">Tab 2</button>
            <button class="tab" role="tab" tabindex="-1">Tab 3</button>
        </div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/tab-bar.js"></script>
</body>
</html>
