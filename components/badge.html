<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Badge Component</title>
    <link rel="stylesheet" href="../css/core.css">
</head>
<body>
    <div class="container" style="padding-top: 2rem;">
        <h1>Badge Component</h1>
        <p>Badges are used to highlight small pieces of information, such as counts or statuses.</p>

        <h2>Standard Badges</h2>
        <span class="badge">Default</span>
        <span class="badge primary">Primary</span>
        <span class="badge secondary">Secondary</span>
        <span class="badge success">Success</span>
        <span class="badge warning">Warning</span>
        <span class="badge error">Error</span>

        <h2 style="margin-top: 2rem;">Pill Badges</h2>
        <span class="badge pill">Default</span>
        <span class="badge pill primary">Primary</span>
        <span class="badge pill secondary">Secondary</span>
        <span class="badge pill success">Success</span>
        <span class="badge pill error">Error</span>

        <h2 style="margin-top: 2rem;">Badges with Icons</h2>
        <span class="badge success"><i class="fas fa-check-circle"></i> Success</span>
        <span class="badge error"><i class="fas fa-times-circle"></i> Error</span>
    </div>
</body>
</html>
