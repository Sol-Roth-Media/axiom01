<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Media Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/media.css">
</head>
<body>

    <div class="container">
        <h1>Media Component</h1>

        <p>The media component provides a flexible and reusable way to add video, audio, and image galleries to your application.</p>

        <h2>Video Player</h2>
        <div class="media-container">
            <video class="media-element" controls poster="../img/axiom.jpeg">
                <source src="../img/demo-video.mp4" type="video/mp4">
                <source src="../img/demo-video.webm" type="video/webm">
                Your browser does not support the video tag.
            </video>
        </div>

        <h2>Audio Player</h2>
        <div class="media-container">
            <audio class="media-element" controls>
                <source src="../img/demo-audio.mp3" type="audio/mpeg">
                <source src="../img/demo-audio.ogg" type="audio/ogg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <h2>Image Gallery</h2>
        <div class="gallery">
            <img src="../img/axiom.jpeg" alt="Axiom01 Logo">
            <img src="../img/web_design_color_wheel.jpeg" alt="Color Wheel">
        </div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/media.js"></script>
</body>
</html>
