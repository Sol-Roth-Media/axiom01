<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Theme Switcher Component</title>
    <link rel="stylesheet" href="../css/core.css">
</head>
<body class="axiom-body">
    <div class="container" style="padding-top: 2rem;">
        <h1>Theme Switcher Component</h1>
        <p>The theme switcher component allows users to cycle through the available themes.</p>

        <div data-component="theme-switcher">
            <label for="theme-select">Select a Theme:</label>
            <select id="theme-select">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="forest">Forest</option>
                <option value="ocean">Ocean</option>
                <option value="sunset">Sunset</option>
            </select>
        </div>
    </div>

    <script src="../js/axiom.js" type="module"></script>
</body>
</html>
