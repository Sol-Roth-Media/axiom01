<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings Component - Axiom01 Framework</title>
  <link rel="stylesheet" href="../css/axiom.css">
</head>
<body>
  <div class="settings">
    <header>
      <h3>Settings</h3>
    </header>
    <section>
      <div class="form-group">
        <label for="gemini-api-key">Gemini API Key</label>
        <input type="password" id="gemini-api-key" placeholder="Enter your Gemini API Key">
      </div>
      <div class="form-group">
        <label for="openai-api-key">OpenAI API Key</label>
        <input type="password" id="openai-api-key" placeholder="Enter your OpenAI API Key">
      </div>
      <div class="form-group">
        <label for="huggingface-api-key">Hugging Face API Key</label>
        <input type="password" id="huggingface-api-key" placeholder="Enter your Hugging Face API Key">
      </div>
      <button id="save-settings-button">Save Settings</button>
    </section>
  </div>
  <script src="../js/settings.js"></script>
</body>
</html>
