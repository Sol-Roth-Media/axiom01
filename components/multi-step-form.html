<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Multi-Step Form Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/stepper.css">
    <link rel="stylesheet" href="../css/multi-step-form.css">
</head>
<body>

    <div class="container">
        <h1>Multi-Step Form Component</h1>

        <p>The multi-step form component guides users through a series of steps to complete a form.</p>

        <div class="multi-step-form">
            <div class="stepper">
                <div class="stepper-step active">
                    <div class="step-number">1</div>
                    <div class="step-line"></div>
                </div>
                <div class="stepper-step">
                    <div class="step-number">2</div>
                    <div class="step-line"></div>
                </div>
                <div class="stepper-step">
                    <div class="step-number">3</div>
                </div>
            </div>

            <form>
                <div class="form-step active">
                    <h2>Step 1: Personal Information</h2>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name">
                    </div>
                </div>
                <div class="form-step">
                    <h2>Step 2: Contact Information</h2>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>
                </div>
                <div class="form-step">
                    <h2>Step 3: Confirmation</h2>
                    <p>Please review your information before submitting.</p>
                </div>

                <div class="form-actions">
                    <button type="button" class="button" data-multi-step-form-prev>Previous</button>
                    <button type="button" class="button primary" data-multi-step-form-next>Next</button>
                    <button type="submit" class="button primary" style="display: none;">Submit</button>
                </div>
            </form>
        </div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/stepper.js"></script>
    <script src="../js/multi-step-form.js"></script>
</body>
</html>
