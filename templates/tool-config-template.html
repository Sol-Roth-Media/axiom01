<!DOCTYPE html>
<!--
    ================================================================================
                                                                              |
                AXIOM01 SPA TEMPLATE: API & CONFIGURATION PANEL                 |
                                                                              |
   INSTRUCTIONS FOR AI/DEVELOPER:                                             |
   1. This template is for a settings/configuration page.                     |
   2. The theme is "rose-pine" for a soft, modern dark UI.                    |
   3. It shows how to display existing data and provide actions.              |
   4. Use JavaScript to handle actions like "Generate New Key" or saving      |
      toggle switch states.                                                   |
   5. Note the use of read-only inputs to display sensitive data.             |
                                                                              |
    ================================================================================
-->
<html lang="en" data-theme="rose-pine">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - Axiom01 Template</title>

    <!-- REQUIRED: Link to the main axiom.css file. -->
    <link rel="stylesheet" href="../css/axiom.css">
    <!-- REQUIRED: Link to Font Awesome for icons. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="axiom-body">

    <main class="container" style="max-width: 800px; padding-top: 2rem; padding-bottom: 2rem;">
        <header style="margin-bottom: 2rem;">
            <h1>Settings</h1>
            <p class="text-muted">Manage your API keys and notification preferences.</p>
        </header>

        <!-- ====================================================================== -->
        <!-- =========================  API KEYS CARD  ============================ -->
        <!-- ====================================================================== -->
        <article class="card">
            <header>
                <h3>API Keys</h3>
                <p>Use these keys to integrate your application with our service.</p>
            </header>

            <form>
                <label for="api-key">Your API Key</label>
                <!-- TIP: Use a read-only input to display sensitive data. Add a button to copy it. -->
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="api-key" value="axm_live_••••••••••••••••••••1234" readonly>
                    <button type="button" class="secondary" aria-label="Copy API Key">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </form>

            <footer>
                <!-- AXIOM PATTERN: Use a destructive (error) button for dangerous actions. -->
                <button class="error">Revoke Key</button>
                <button class="primary">Generate New Key</button>
            </footer>
        </article>

        <!-- ====================================================================== -->
        <!-- =====================  NOTIFICATION SETTINGS  ======================== -->
        <!-- ====================================================================== -->
        <article class="card" style="margin-top: 2rem;">
            <header>
                <h3>Notifications</h3>
                <p>Choose how you receive updates from us.</p>
            </header>

            <!-- AXIOM PATTERN: Use the toggle switch component for boolean settings. -->
            <div class="toggle-group">
                <label class="toggle">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Email me for product updates.</span>
                </label>
                <label class="toggle">
                    <input type="checkbox" role="switch">
                    <span></span>
                    <span>Email me for security alerts.</span>
                </label>
                <label class="toggle">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Email me a weekly usage summary.</span>
                </label>
            </div>

            <footer>
                <button class="primary large">Save Preferences</button>
            </footer>
        </article>
    </main>

</body>
</html>
