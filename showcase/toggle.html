<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom01 - Toggle Switch Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Toggle Switch Component</h1>
            <p>Accessible toggle switches for binary on/off states with proper ARIA support.</p>
        </header>

        <section class="component-demo">
            <h2>Basic Toggles</h2>
            <div>
                <label class="toggle">
                    <input type="checkbox" role="switch" aria-describedby="notifications-desc">
                    <span></span>
                    <span>Enable notifications</span>
                </label>
                <p id="notifications-desc" class="help-text">Receive email notifications for updates</p>

                <label class="toggle">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Dark mode</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" role="switch" disabled>
                    <span></span>
                    <span>Disabled toggle</span>
                </label>
            </div>
        </section>

        <section class="component-demo">
            <h2>Toggle Sizes</h2>
            <div>
                <label class="toggle small">
                    <input type="checkbox" role="switch">
                    <span></span>
                    <span>Small toggle</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Default toggle</span>
                </label>

                <label class="toggle large">
                    <input type="checkbox" role="switch">
                    <span></span>
                    <span>Large toggle</span>
                </label>
            </div>
        </section>

        <section class="component-demo">
            <h2>Toggle Variants</h2>
            <div>
                <label class="toggle primary">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Primary color</span>
                </label>

                <label class="toggle success">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Success state</span>
                </label>

                <label class="toggle warning">
                    <input type="checkbox" role="switch" checked>
                    <span></span>
                    <span>Warning state</span>
                </label>
            </div>
        </section>

        <section class="component-demo">
            <h2>Interactive Demo</h2>
            <div>
                <label class="toggle">
                    <input type="checkbox" role="switch" id="demo-toggle">
                    <span></span>
                    <span>Master switch</span>
                </label>
                <div id="toggle-status" class="status-display" aria-live="polite">
                    Status: Off
                </div>
            </div>
        </section>
    </main>

    <script src="../js/toggle.js"></script>
</body>
</html>
