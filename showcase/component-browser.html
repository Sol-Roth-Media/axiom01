<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Component Browser</title>
    <link rel="stylesheet" href="../dist/css/axiom.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>
    <div class="container" style="padding-top: 2rem;">
        <h1>Component Browser</h1>
        <p>This is a standalone view of the component browser. It is typically embedded within the main `index.html` page.</p>
        
        <div class="component-browser" data-component="component-browser">
            <header>
                <div class="info">
                    <h4>Component Library (<span id="component-count">40+</span> Components)</h4>
                    <p>Explore our growing collection of components.</p>
                </div>
                <div class="controls">
                    <input type="text" id="component-search-input" placeholder="Search components...">
                    <select id="component-category-filter">
                        <option value="all">All Categories</option>
                    </select>
                </div>
            </header>
            <div class="tabs-container">
                <div class="tabs">
                    <!-- Component buttons will be dynamically loaded here -->
                </div>
            </div>
            <div class="preview-container">
                <div class="preview">
                    <iframe id="component-preview-iframe" src="accordion.html"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/axiom.js" type="module"></script>
</body>
</html>
