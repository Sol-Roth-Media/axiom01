<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Alert Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/alert.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1>Alert Component</h1>

        <p>The alert component is used to display important messages to users.</p>

        <h2>Static Alerts</h2>
        <div class="alert success">
            <i class="fas fa-check-circle"></i>
            <div>This is a success alert.</div>
        </div>
        <div class="alert info">
            <i class="fas fa-info-circle"></i>
            <div>This is an info alert.</div>
        </div>
        <div class="alert warning">
            <i class="fas fa-exclamation-triangle"></i>
            <div>This is a warning alert.</div>
        </div>
        <div class="alert error">
            <i class="fas fa-exclamation-circle"></i>
            <div>This is an error alert.</div>
        </div>

        <h2>Dismissible Alerts</h2>
        <div class="alert success dismissible">
            <i class="fas fa-check-circle"></i>
            <div>This is a dismissible success alert.</div>
            <button data-alert-close>&times;</button>
        </div>

        <h2>Dynamic Alerts (Toasts)</h2>
        <button class="button" onclick="AxiomComponents.Alert.show('success', 'This is a success toast.')">Show Success Toast</button>
        <button class="button" onclick="AxiomComponents.Alert.show('info', 'This is an info toast.')">Show Info Toast</button>
        <button class="button" onclick="AxiomComponents.Alert.show('warning', 'This is a warning toast.')">Show Warning Toast</button>
        <button class="button" onclick="AxiomComponents.Alert.show('error', 'This is an error toast.')">Show Error Toast</button>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/alert.js"></script>
</body>
</html>
