<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom01 - Avatar Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Avatar Component</h1>
            <p>User avatars with fallbacks, status indicators, and accessibility features.</p>
        </header>

        <section class="component-demo">
            <h2>Basic Avatars</h2>
            <div>
                <img class="avatar" src="../img/avatar-1.jpg" alt="John Smith">
                <img class="avatar" src="../img/avatar-2.jpg" alt="Jane Doe">
                <div class="avatar" aria-label="User initials: AB">AB</div>
                <div class="avatar" aria-label="User initials: CD">CD</div>
            </div>
        </section>

        <section class="component-demo">
            <h2>Avatar Sizes</h2>
            <div>
                <img class="avatar small" src="../img/avatar-1.jpg" alt="Small avatar">
                <img class="avatar" src="../img/avatar-1.jpg" alt="Default avatar">
                <img class="avatar large" src="../img/avatar-1.jpg" alt="Large avatar">
                <img class="avatar xlarge" src="../img/avatar-1.jpg" alt="Extra large avatar">
            </div>
        </section>

        <section class="component-demo">
            <h2>Avatar with Status</h2>
            <div>
                <div class="avatar-wrapper">
                    <img class="avatar" src="../img/avatar-1.jpg" alt="John Smith">
                    <span class="status online" aria-label="Online"></span>
                </div>
                <div class="avatar-wrapper">
                    <img class="avatar" src="../img/avatar-2.jpg" alt="Jane Doe">
                    <span class="status busy" aria-label="Busy"></span>
                </div>
                <div class="avatar-wrapper">
                    <img class="avatar" src="../img/avatar-3.jpg" alt="Bob Johnson">
                    <span class="status away" aria-label="Away"></span>
                </div>
                <div class="avatar-wrapper">
                    <img class="avatar" src="../img/avatar-4.jpg" alt="Alice Wilson">
                    <span class="status offline" aria-label="Offline"></span>
                </div>
            </div>
        </section>

        <section class="component-demo">
            <h2>Avatar Groups</h2>
            <div class="avatar-group">
                <img class="avatar" src="../img/avatar-1.jpg" alt="Team member 1">
                <img class="avatar" src="../img/avatar-2.jpg" alt="Team member 2">
                <img class="avatar" src="../img/avatar-3.jpg" alt="Team member 3">
                <div class="avatar" aria-label="2 more members">+2</div>
            </div>
        </section>
    </main>

    <script src="../js/avatar.js"></script>
</body>
</html>
