<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Test</title>
    <link rel="stylesheet" href="css/axiom.min.css">
    <style>
        body { margin: 0; padding: 20px; }
        .test-section { margin: 40px 0; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .test-section h2 { margin-top: 0; }
        .debug-info { 
            background: white; 
            border: 2px solid red; 
            padding: 10px; 
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-section">
        <h2>Navbar Debug Test</h2>
        
        <h3>Current Navbar (from index.html):</h3>
        <header class="main" data-component="mobile-navbar">
            <nav role="navigation" aria-label="Main Navigation">
                <a href="/" class="brand">[Ax<span class="primary">01</span>]</a>
                <ul class="links">
                    <li><a href="docs/overview-quickstart.html">Get Started</a></li>
                    <li><a href="docs/components-overview.html">Docs</a></li>
                    <li><a href="#axicons">Axicons</a></li>
                </ul>
                <div class="actions">
                    <button class="search toggle" aria-label="Open Search">🔍</button>
                    <a href="https://github.com/Sol-Roth-Media/axiom01" class="github" target="_blank" aria-label="GitHub">
                        <span>GitHub</span>
                    </a>
                    <button class="theme toggle" aria-label="Theme">🌙</button>
                    <button class="menu toggle" aria-label="Menu">☰</button>
                </div>
            </nav>
        </header>
        
        <div class="debug-info">
            <strong>Expected Layout (Desktop):</strong><br>
            [Ax01] --- Get Started Docs Axicons --- 🔍 GitHub 🌙
            <br><br>
            <strong>Actual Position:</strong><br>
            Check visually above this text
        </div>
    </div>

    <script>
        // Debug script to show computed styles
        window.addEventListener('load', function() {
            const nav = document.querySelector('header.main nav');
            const brand = document.querySelector('header.main .brand');
            const links = document.querySelector('header.main .links');
            const actions = document.querySelector('header.main .actions');
            
            console.log('=== NAVBAR DEBUG ===');
            console.log('Nav display:', getComputedStyle(nav).display);
            console.log('Nav justify-content:', getComputedStyle(nav).justifyContent);
            console.log('Nav flex-wrap:', getComputedStyle(nav).flexWrap);
            console.log('---');
            console.log('Brand flex-shrink:', getComputedStyle(brand).flexShrink);
            console.log('Brand order:', getComputedStyle(brand).order);
            console.log('---');
            console.log('Links flex:', getComputedStyle(links).flex);
            console.log('Links justify-content:', getComputedStyle(links).justifyContent);
            console.log('Links order:', getComputedStyle(links).order);
            console.log('---');
            console.log('Actions flex-shrink:', getComputedStyle(actions).flexShrink);
            console.log('Actions margin-left:', getComputedStyle(actions).marginLeft);
            console.log('Actions order:', getComputedStyle(actions).order);
        });
    </script>
</body>
</html>
