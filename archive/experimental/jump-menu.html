<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Jump Menu Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/jump-menu.css">
</head>
<body>

    <div class="container">
        <h1>Jump Menu Component</h1>

        <p>The jump menu component provides a quick way for users to navigate to different sections of a page.</p>

        <h2>Example</h2>

        <div class="jump-menu">
            <a href="#section1">Section 1</a>
            <a href="#section2">Section 2</a>
            <a href="#section3">Section 3</a>
        </div>

        <div id="section1" style="height: 500px; margin-top: 2rem; border: 1px solid black; padding: 1rem;">Section 1</div>
        <div id="section2" style="height: 500px; margin-top: 2rem; border: 1px solid black; padding: 1rem;">Section 2</div>
        <div id="section3" style="height: 500px; margin-top: 2rem; border: 1px solid black; padding: 1rem;">Section 3</div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/jump-menu.js"></script>
</body>
</html>
