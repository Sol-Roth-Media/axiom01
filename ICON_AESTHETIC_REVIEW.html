<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axicons - Icon Aesthetic Review</title>
    <link rel="stylesheet" href="../css/axicons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 2rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; }

        .review-controls {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-weight: 600;
            font-size: 0.9em;
        }

        .control-group select,
        .control-group input,
        button {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
        }

        button {
            background: #0066cc;
            color: white;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }

        button:hover {
            background: #0052a3;
        }

        .review-card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #0066cc;
        }

        .icon-comparison {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .icon-display {
            text-align: center;
            padding: 1.5rem;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .icon-display svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            display: block;
        }

        .icon-display svg.thin {
            stroke-width: 0.5;
        }

        .icon-display h3 {
            font-size: 0.9em;
            margin-bottom: 0.5rem;
        }

        .icon-display .desc {
            font-size: 0.8em;
            color: #666;
        }

        .review-notes {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .review-notes h4 {
            color: #856404;
            margin-bottom: 0.5rem;
        }

        .review-notes p {
            color: #856404;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .issues-list {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
        }

        .issues-list li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: #856404;
        }

        .issues-list li::before {
            content: "⚠️ ";
            position: absolute;
            left: 0;
        }

        .suggestion-list li::before {
            content: "✓ ";
            position: absolute;
            left: 0;
            color: #28a745;
        }

        .suggestion-list {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
        }

        .suggestion-list li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: #856404;
        }

        .icon-info {
            background: #e8f4f8;
            border-left: 4px solid #0066cc;
            padding: 1rem;
            border-radius: 4px;
            margin: 1.5rem 0;
            font-size: 0.9em;
        }

        .icon-info strong {
            display: block;
            margin-bottom: 0.5rem;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .nav-buttons button {
            flex: 1;
            max-width: 200px;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress {
            text-align: center;
            color: #666;
            margin: 1rem 0;
        }

        .category-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .category-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .category-item:hover {
            border-color: #0066cc;
            background: #f0f8ff;
            transform: translateY(-2px);
        }

        .category-item .count {
            font-size: 1.8em;
            font-weight: 700;
            color: #0066cc;
            margin-bottom: 0.5rem;
        }

        .category-item .name {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Axicons Aesthetic Review</h1>
        <p class="subtitle">Systematic review and design improvements for all icons</p>

        <div class="review-controls">
            <div class="control-group">
                <label for="category">Category:</label>
                <select id="category">
                    <option value="">All Categories</option>
                    <option value="User">User/Profile</option>
                    <option value="Security">Security</option>
                    <option value="Navigation">Navigation</option>
                    <option value="Status">Status/Alert</option>
                    <option value="Input">Input/Form</option>
                    <option value="Action">Action</option>
                    <option value="Media">Media</option>
                    <option value="AI">AI/ML</option>
                    <option value="Social">Social</option>
                    <option value="Brand">Brand/Platform</option>
                </select>
            </div>
            <div class="control-group">
                <label for="search">Search Icon:</label>
                <input type="text" id="search" placeholder="e.g., Home, Settings, User...">
            </div>
            <div class="control-group">
                <button onclick="startReview()">Start Review</button>
            </div>
        </div>

        <div id="reviewContent"></div>
    </div>

    <script src="../js/axicons.js"></script>
    <script>
        let currentIndex = 0;
        let filteredIcons = [];

        function getCategory(iconName) {
            if (iconName.includes('User') || iconName.includes('Avatar')) return 'User';
            if (iconName.includes('Lock') || iconName.includes('Key') || iconName.includes('Shield')) return 'Security';
            if (iconName.includes('Home') || iconName.includes('Menu') || iconName.includes('Chevron') || iconName.includes('Arrow')) return 'Navigation';
            if (iconName.includes('Bell') || iconName.includes('Alert') || iconName.includes('Check')) return 'Status';
            if (iconName.includes('Mail') || iconName.includes('Search') || iconName.includes('Phone') || iconName.includes('Input')) return 'Input';
            if (iconName.includes('Settings') || iconName.includes('Edit') || iconName.includes('Trash')) return 'Action';
            if (iconName.includes('Play') || iconName.includes('Pause') || iconName.includes('Music') || iconName.includes('Volume')) return 'Media';
            if (iconName.includes('ChatGPT') || iconName.includes('Claude') || iconName.includes('Gemini')) return 'AI';
            if (iconName.includes('Twitter') || iconName.includes('Facebook') || iconName.includes('Instagram')) return 'Social';
            if (iconName.includes('Github') || iconName.includes('Docker') || iconName.includes('Slack')) return 'Brand';
            return 'Other';
        }

        function startReview() {
            const category = document.getElementById('category').value;
            const search = document.getElementById('search').value.toLowerCase();

            filteredIcons = axicons.filter(icon => {
                const matchCategory = !category || getCategory(icon.name) === category;
                const matchSearch = !search || icon.name.toLowerCase().includes(search);
                return matchCategory && matchSearch && !icon.name.includes('Inverted'); // Review Regular and Thin only
            });

            if (filteredIcons.length === 0) {
                document.getElementById('reviewContent').innerHTML = '<p style="text-align: center; color: #666;">No icons found. Try adjusting your filters.</p>';
                return;
            }

            currentIndex = 0;
            showCurrentIcon();
        }

        function showCurrentIcon() {
            if (currentIndex >= filteredIcons.length) {
                document.getElementById('reviewContent').innerHTML = '<p style="text-align: center; color: #666;">Review complete! All icons examined.</p>';
                return;
            }

            const icon = filteredIcons[currentIndex];
            const regular = icon;
            const thin = axicons.find(i => i.name === icon.name.replace('Regular', '') + 'Thin');

            const html = `
                <div class="review-card">
                    <div class="progress">${currentIndex + 1} / ${filteredIcons.length} - ${getCategory(icon.name)}</div>
                    
                    <h2>${icon.name}</h2>
                    <p style="color: #666; margin-bottom: 1.5rem;">Icon ID: ${icon.id}</p>

                    <div class="icon-comparison">
                        <div class="icon-display">
                            <h3>Regular (2px)</h3>
                            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" fill="none">
                                ${icon.svgContent}
                            </svg>
                            <p class="desc">Bold, prominent</p>
                        </div>
                        ${thin ? `
                        <div class="icon-display">
                            <h3>Thin (0.5px)</h3>
                            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" fill="none">
                                ${thin.svgContent}
                            </svg>
                            <p class="desc">Hollow, elegant</p>
                        </div>
                        ` : ''}
                    </div>

                    <div class="icon-info">
                        <strong>Design Checklist:</strong>
                        <label style="display: block; margin: 0.5rem 0;">
                            <input type="checkbox"> Consistent stroke weight
                        </label>
                        <label style="display: block; margin: 0.5rem 0;">
                            <input type="checkbox"> Balanced proportions
                        </label>
                        <label style="display: block; margin: 0.5rem 0;">
                            <input type="checkbox"> Clear at all sizes (16px-256px)
                        </label>
                        <label style="display: block; margin: 0.5rem 0;">
                            <input type="checkbox"> Distinctive from similar icons
                        </label>
                        <label style="display: block; margin: 0.5rem 0;">
                            <input type="checkbox"> Good thin variant clarity
                        </label>
                    </div>

                    <div class="review-notes">
                        <h4>📝 Notes for this icon:</h4>
                        <p>Please review the design for:</p>
                        <ul class="issues-list">
                            <li>Geometric balance and symmetry</li>
                            <li>Stroke consistency (no varying widths)</li>
                            <li>Visual clarity at small sizes</li>
                            <li>Comparison with similar icons</li>
                            <li>Thin variant legibility</li>
                        </ul>
                    </div>

                    <div style="background: #f0f8ff; border: 1px solid #0066cc; border-radius: 4px; padding: 1rem; margin: 1.5rem 0;">
                        <strong style="display: block; margin-bottom: 0.5rem;">Design Issues or Improvements Needed?</strong>
                        <textarea id="iconNotes" placeholder="Describe any aesthetic issues or improvements needed..." style="width: 100%; height: 100px; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; resize: vertical;"></textarea>
                    </div>

                    <div class="nav-buttons">
                        <button onclick="previousIcon()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                        <button onclick="nextIcon()">Next →</button>
                    </div>
                </div>
            `;

            document.getElementById('reviewContent').innerHTML = html;
        }

        function nextIcon() {
            currentIndex++;
            showCurrentIcon();
        }

        function previousIcon() {
            if (currentIndex > 0) {
                currentIndex--;
                showCurrentIcon();
            }
        }

        // Start with category overview
        const categoryList = `
            <div style="text-align: center; margin-bottom: 2rem;">
                <p style="color: #666; margin-bottom: 1.5rem;">Click a category to start reviewing icons in that category, or use the filters above to search.</p>
            </div>
            <div class="category-list">
                <div class="category-item" onclick="document.getElementById('category').value='User'; startReview();">
                    <div class="count">~80</div>
                    <div class="name">User/Profile Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Security'; startReview();">
                    <div class="count">~30</div>
                    <div class="name">Security Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Navigation'; startReview();">
                    <div class="count">~50</div>
                    <div class="name">Navigation Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Status'; startReview();">
                    <div class="count">~40</div>
                    <div class="name">Status/Alert Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Input'; startReview();">
                    <div class="count">~50</div>
                    <div class="name">Input/Form Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Action'; startReview();">
                    <div class="count">~60</div>
                    <div class="name">Action Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Media'; startReview();">
                    <div class="count">~40</div>
                    <div class="name">Media Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='AI'; startReview();">
                    <div class="count">~15</div>
                    <div class="name">AI/ML Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Social'; startReview();">
                    <div class="count">~20</div>
                    <div class="name">Social Icons</div>
                </div>
                <div class="category-item" onclick="document.getElementById('category').value='Brand'; startReview();">
                    <div class="count">~70</div>
                    <div class="name">Brand/Platform Icons</div>
                </div>
            </div>
        `;

        document.getElementById('reviewContent').innerHTML = categoryList;
    </script>
</body>
</html>
