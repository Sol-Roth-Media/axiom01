<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom01 - Slider/Range Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Slider/Range Component</h1>
            <p>Accessible range sliders for selecting numeric values with keyboard navigation and screen reader support.</p>
        </header>

        <section class="component-demo">
            <h2>Basic Sliders</h2>
            <div>
                <div class="form-group">
                    <label for="volume-slider">Volume</label>
                    <input type="range" id="volume-slider" class="slider" min="0" max="100" value="50" aria-describedby="volume-value">
                    <output id="volume-value" for="volume-slider">50</output>
                </div>

                <div class="form-group">
                    <label for="brightness-slider">Brightness</label>
                    <input type="range" id="brightness-slider" class="slider" min="0" max="100" value="75" step="5">
                    <output for="brightness-slider">75</output>
                </div>

                <div class="form-group">
                    <label for="price-slider">Price Range ($)</label>
                    <input type="range" id="price-slider" class="slider" min="0" max="1000" value="250" step="25">
                    <output for="price-slider">$250</output>
                </div>
            </div>
        </section>

        <section class="component-demo">
            <h2>Slider Variants</h2>
            <div>
                <div class="form-group">
                    <label for="primary-slider">Primary Color</label>
                    <input type="range" id="primary-slider" class="slider primary" min="0" max="100" value="60">
                    <output for="primary-slider">60</output>
                </div>

                <div class="form-group">
                    <label for="success-slider">Success Color</label>
                    <input type="range" id="success-slider" class="slider success" min="0" max="100" value="80">
                    <output for="success-slider">80</output>
                </div>

                <div class="form-group">
                    <label for="warning-slider">Warning Color</label>
                    <input type="range" id="warning-slider" class="slider warning" min="0" max="100" value="40">
                    <output for="warning-slider">40</output>
                </div>
            </div>
        </section>

        <section class="component-demo">
            <h2>Disabled State</h2>
            <div class="form-group">
                <label for="disabled-slider">Disabled Slider</label>
                <input type="range" id="disabled-slider" class="slider" min="0" max="100" value="30" disabled>
                <output for="disabled-slider">30</output>
            </div>
        </section>

        <section class="component-demo">
            <h2>Interactive Demo</h2>
            <div>
                <div class="form-group">
                    <label for="demo-slider">Adjust Value</label>
                    <input type="range" id="demo-slider" class="slider" min="0" max="100" value="50">
                    <output id="demo-output" for="demo-slider">50</output>
                </div>
                <div id="slider-feedback" class="feedback" aria-live="polite">
                    Current value: 50
                </div>
            </div>
        </section>
    </main>

    <script src="../js/slider.js"></script>
</body>
</html>
