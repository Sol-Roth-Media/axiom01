<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom01 - Tooltip Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Tooltip Component</h1>
            <p>Accessible tooltips that provide additional context on hover and focus with proper keyboard navigation.</p>
        </header>

        <section class="component-demo">
            <h2>Basic Tooltips</h2>
            <div class="tooltip-examples">
                <button class="tooltip" data-tooltip="This is a helpful tooltip">
                    Hover me
                    <span role="tooltip" aria-hidden="true">This is a helpful tooltip</span>
                </button>

                <button class="tooltip primary" data-tooltip="Primary action tooltip">
                    Primary Button
                    <span role="tooltip" aria-hidden="true">Primary action tooltip</span>
                </button>

                <a href="#" class="tooltip" data-tooltip="Link tooltip description">
                    Link with tooltip
                    <span role="tooltip" aria-hidden="true">Link tooltip description</span>
                </a>
            </div>
        </section>

        <section class="component-demo">
            <h2>Tooltip Positions</h2>
            <div>
                <button class="tooltip top" data-tooltip="Tooltip appears above">
                    Top
                    <span role="tooltip" aria-hidden="true">Tooltip appears above</span>
                </button>

                <button class="tooltip right" data-tooltip="Tooltip appears to the right">
                    Right
                    <span role="tooltip" aria-hidden="true">Tooltip appears to the right</span>
                </button>

                <button class="tooltip bottom" data-tooltip="Tooltip appears below">
                    Bottom
                    <span role="tooltip" aria-hidden="true">Tooltip appears below</span>
                </button>

                <button class="tooltip left" data-tooltip="Tooltip appears to the left">
                    Left
                    <span role="tooltip" aria-hidden="true">Tooltip appears to the left</span>
                </button>
            </div>
        </section>

        <section class="component-demo">
            <h2>Rich Tooltips</h2>
            <button class="tooltip rich" data-tooltip-id="rich-tooltip">
                Complex Content
                <div role="tooltip" aria-hidden="true" id="rich-tooltip">
                    <h4>Rich Tooltip</h4>
                    <p>Tooltips can contain <strong>formatted text</strong> and multiple elements.</p>
                    <small>Use sparingly for complex information.</small>
                </div>
            </button>
        </section>

        <section class="component-demo">
            <h2>Interactive Demo</h2>
            <div>
                <button id="toggle-tooltips" class="secondary">Toggle All Tooltips</button>
                <button id="keyboard-test" class="tooltip" data-tooltip="Use Tab to focus and test keyboard accessibility">
                    Test Keyboard Navigation
                    <span role="tooltip" aria-hidden="true">Use Tab to focus and test keyboard accessibility</span>
                </button>
            </div>
        </section>
    </main>

    <script src="../js/tooltip.js"></script>
</body>
</html>
