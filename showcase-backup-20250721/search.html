<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Search Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body>

    <div class="container">
        <h1>Search Component</h1>

        <p>The search component provides a flexible and reusable way to add search functionality to your application.</p>

        <h2>Example</h2>

        <form role="search" data-results-container="search-results-1" data-data-url="/data/search.json">
            <input type="search" placeholder="Search...">
        </form>

        <div id="search-results-1" class="search-results"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script src="../js/axiom.js"></script>
    <script src="../js/search.js"></script>
</body>
</html>
