<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Commerce Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/commerce.css">
</head>
<body>

    <div class="container">
        <h1>Commerce Component</h1>

        <p>The commerce component provides a set of styles for displaying products and other e-commerce elements.</p>

        <h2>Product Card</h2>
        <div class="product-card">
            <img src="../img/axiom.jpeg" alt="Product Image" class="product-image">
            <div class="product-info">
                <h3 class="product-name">Axiom T-Shirt</h3>
                <p class="product-price">$25.00</p>
                <button class="button primary">Add to Cart</button>
            </div>
        </div>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/commerce.js"></script>
</body>
</html>
