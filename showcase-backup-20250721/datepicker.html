<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Datepicker Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/datepicker.css">
</head>
<body>

    <div class="container">
        <h1>Datepicker Component</h1>

        <p>The datepicker component allows users to select dates from a calendar interface. It is accessible, themeable, and uses semantic markup with axiom01 styling.</p>

        <h2>Example</h2>
        <label for="demo-datepicker">Choose a date:</label>
        <input type="date" id="demo-datepicker" aria-label="Datepicker">

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/datepicker.js"></script>
</body>
</html>
