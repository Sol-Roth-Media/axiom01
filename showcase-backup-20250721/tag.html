<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom - Tag Component</title>
    <link rel="stylesheet" href="../css/axiom.css">
    <link rel="stylesheet" href="../css/tag.css">
</head>
<body>

    <div class="container">
        <h1>Tag Component</h1>

        <p>The tag component is used to display small pieces of information, such as categories or keywords.</p>

        <h2>Examples</h2>

        <span class="tag">Default</span>
        <span class="tag primary">Primary</span>
        <span class="tag success">Success</span>

        <h2>Removable Tags</h2>

        <span class="tag">
            Removable
            <button class="tag-remove" aria-label="Remove tag">&times;</button>
        </span>

    </div>

    <script src="../js/axiom.js"></script>
    <script src="../js/tag.js"></script>
</body>
</html>
