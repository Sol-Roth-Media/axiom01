<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete - Axiom01</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/doc-styles.css">
</head>
<body class="axiom-body">
  <main class="content">
    <section>
      <div class="container">
        <h1>Autocomplete</h1>
        <p>Lightweight combobox behavior with keyboard navigation and ARIA states.</p>
        <section class="autocomplete" data-component="autocomplete" data-options="Accessibility,Accordion,Autocomplete,Carousel,Countdown,Dropdown,File Display,Multimedia Picker,Pull to Refresh,Story View,Touch,Timer" aria-label="Autocomplete input">
          <label for="autocomplete-input">Component search</label>
          <input id="autocomplete-input" type="text" aria-controls="autocomplete-list" aria-expanded="false">
          <ul id="autocomplete-list" role="listbox" hidden></ul>
        </section>
      </div>
    </section>
  </main>
  <script src="../../js/axiom.js"></script>
</body>
</html>
