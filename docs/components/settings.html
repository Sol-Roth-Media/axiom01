<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Component - Axiom01</title>
    <link rel="stylesheet" href="../../css/axiom.css">    <link rel="stylesheet" href="../../css/doc-preview.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="axiom-body component-doc">
    <header class="main" data-component="mobile-navbar">
        <nav role="navigation" aria-label="Main Navigation">
            <a href="../../index.html" class="brand" aria-label="Axiom01 Framework Home">[Ax<span class="primary">01</span>]</a>
            <ul class="links">
                <li><a href="../../index.html#philosophy">Philosophy</a></li>
                <li><a href="../../index.html#components">Components</a></li>
                <li><a href="../../index.html#get-started">Get Started</a></li>
                <li><a href="../components-overview.html">Component Overview</a></li>
            </ul>
            <div class="actions">
                <button class="search toggle" aria-label="Open Search">
                    <span class="axicon render" data-name="Search"></span>
                </button>
                <a href="https://github.com/Sol-Roth-Media/axiom" class="github" target="_blank" rel="noopener" aria-label="View on GitHub">
                    <span class="axicon render" data-name="Brand-Github"></span>
                    <span>GitHub</span>
                </a>
                <button class="theme toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <span class="axicon render" data-name="Moon"></span>
                </button>
                <button class="menu toggle" aria-label="Toggle Menu">
                    <span class="axicon render" data-name="Menu"></span>
                </button>
            </div>
        </nav>
    </header>


    <main>

        <div class="component-section">

        <div class="section">
            <h2 class="title">Live Example</h2>
            <div class="live">
                <div class="settings-panel">
                    <header>
                        <h3>User Preferences</h3>
                    </header>
                    <section>
                        <div class="setting-group">
                            <h4>General</h4>
                            <div class="setting-item">
                                <label for="theme-select-setting">Theme</label>
                                <select id="theme-select-setting">
                                    <option value="light">Light</option>
                                    <option value="dark">Dark</option>
                                    <option value="corporate-clean">Corporate Clean</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label for="language-select">Language</label>
                                <select id="language-select">
                                    <option value="en">English</option>
                                    <option value="es">Spanish</option>
                                    <option value="fr">French</option>
                                </select>
                            </div>
                        </div>

                        <div class="setting-group">
                            <h4>Notifications</h4>
                            <div class="setting-item toggle-setting">
                                <label for="email-notifications">Email Notifications</label>
                                <input type="checkbox" id="email-notifications" role="switch" checked>
                            </div>
                            <div class="setting-item toggle-setting">
                                <label for="push-notifications">Push Notifications</label>
                                <input type="checkbox" id="push-notifications" role="switch">
                            </div>
                        </div>
                    </section>

        <div class="component-section">
                    <footer>
                        <button class="button secondary">Cancel</button>
                        <button class="button primary">Save Changes</button>
                    </footer>
    <script src="../../js/axicons.js"></script>
<script>
		function renderAxicons() {
			if (typeof axicons !== 'undefined' && axicons.length > 0) {
				document.querySelectorAll('.axicon.render').forEach(el => {
					const name = el.getAttribute('data-name');
					if (name) {
						const icon = axicons.find(i => i.name.toLowerCase() === name.toLowerCase());
						if (icon) {
							el.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">${icon.svgContent}</svg>`;
						}
					}
				});
			}
		}
		// Render icons immediately and on load
		renderAxicons();
		window.addEventListener('load', renderAxicons);
		document.addEventListener('DOMContentLoaded', renderAxicons);
	</script>


    <script src="../../js/axiom.js"></script>
    <script src="../../js/sticky-header.js"></script>
    <script src="../../js/code-copy.js"></script>
	<script src="../../js/index-page-manager.js"></script>
    <script type="module">
        import mobileNavbar from '../../js/components/mobile-navbar.js';
        const navElement = document.querySelector('header[data-component="mobile-navbar"]');
        if (navElement) {
            mobileNavbar.init(navElement);
        }
    </script>

</body>
</html>
