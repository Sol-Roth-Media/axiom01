<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch and Countdown - Axiom01</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/doc-styles.css">
</head>
<body class="axiom-body">
  <main class="content">
    <section>
      <div class="container">
        <h1>Stopwatch and Countdown</h1>
        <p>A dual timer with one control model for elapsed and remaining time.</p>
        <section class="timer" data-component="timer" aria-label="Timer component">
          <label for="timer-mode">Mode</label>
          <select id="timer-mode">
            <option value="stopwatch">Stopwatch</option>
            <option value="countdown">Countdown</option>
          </select>
          <label for="timer-minutes">Minutes</label>
          <input id="timer-minutes" name="minutes" type="number" min="0" value="0">
          <label for="timer-seconds">Seconds</label>
          <input id="timer-seconds" name="seconds" type="number" min="0" max="59" value="30">
          <time aria-live="polite">00:00.0</time>
          <nav aria-label="Timer controls">
            <button type="button" data-action="start">Start</button>
            <button type="button" data-action="pause">Pause</button>
            <button type="button" data-action="reset">Reset</button>
          </nav>
          <p role="status" aria-live="polite"></p>
        </section>
      </div>
    </section>
  </main>
  <script src="../../js/axiom.js"></script>
</body>
</html>
