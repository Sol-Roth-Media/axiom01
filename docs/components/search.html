<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Component – Axiom01 Documentation</title>
  <link rel="stylesheet" href="../../css/axiom.css">
</head>
<body>
  <article>
    <header>
      <h1>Search Component</h1>
      <p>Powerful search interfaces with autocomplete, filters, and accessible keyboard navigation.</p>
    </header>
    <main>
      <section>
        <h2>Basic Search Example</h2>
        <form role="search">
          <label for="search-input">Search</label>
          <input type="search" id="search-input" placeholder="Search..." aria-describedby="search-help">
          <button type="reset" aria-label="Clear search">✖</button>
          <p id="search-help">Enter keywords to search</p>
        </form>
      </section>
      <section>
        <h2>Search with Button Example</h2>
        <form role="search">
          <label for="main-search">Search products</label>
          <input type="search" id="main-search" placeholder="Search products...">
          <button type="submit" aria-label="Submit search">🔍</button>
        </form>
      </section>
      <section>
        <h2>Search with Autocomplete Example</h2>
        <form role="search">
          <label for="autocomplete-search">Search documentation</label>
          <input type="search" id="autocomplete-search" placeholder="Type to search..." aria-expanded="false" aria-haspopup="listbox" aria-autocomplete="list" aria-describedby="search-instructions">
          <div id="search-results" role="listbox" aria-label="Search suggestions" hidden></div>
          <p id="search-instructions">Type to see suggestions</p>
        </form>
      </section>
    </main>
  </article>
</body>
</html>
