<!-- AXIOM01 COMPONENT: AI Chat -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Component</title>
    <link rel="stylesheet" href="../../css/axiom.css">
    <script src="../../js/ai-chat.js" defer></script>
</head>
<body class="axiom-body">
    <main class="container">
        <h1>AI Chat</h1>
        <div id="ai-chat-root"></div>
        <button id="ai-chat-toggle-button" class="button primary" style="margin-top:2rem;">Open AI Chat</button>
    </main>
    <script>
      // Initialize the AI Chat widget on page load
      document.addEventListener('DOMContentLoaded', function() {
        if (window.AIChat && document.getElementById('ai-chat-root')) {
          AIChat.init(document.getElementById('ai-chat-root'));
        }
        // Optional: Toggle button logic
        var toggleBtn = document.getElementById('ai-chat-toggle-button');
        var chatPanel = document.querySelector('.ai-chat-panel');
        if (toggleBtn && chatPanel) {
          toggleBtn.addEventListener('click', function() {
            chatPanel.classList.toggle('is-hidden');
          });
        }
      });
    </script>
</body>
</html>
