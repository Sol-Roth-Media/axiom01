<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Display and Download - Axiom01</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/doc-styles.css">
</head>
<body class="axiom-body">
  <main class="content">
    <section>
      <div class="container">
        <h1>File Display and Download</h1>
        <p>Render local file metadata with optional text previews and download actions.</p>
        <section class="filedisplay" data-component="filedisplay" aria-label="File display and download">
          <label for="file-display-input">Choose files to preview</label>
          <input id="file-display-input" type="file" multiple>
          <ul></ul>
        </section>
      </div>
    </section>
  </main>
