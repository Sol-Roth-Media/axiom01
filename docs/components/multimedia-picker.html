<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Picker - Axiom01</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/doc-styles.css">
    <link rel="stylesheet" href="../../css/doc-preview.css">
</head>
<body class="axiom-body component-doc">
  <main class="content">
    <section>
      <div class="container">
        <h1>Multimedia Picker</h1>
        <p>Select or drag files, then preview image, video, and audio assets.</p>
        <section class="multimediapicker" data-component="multimediapicker" aria-label="Multimedia picker">
          <label for="multimedia-input">Choose media files</label>
          <input id="multimedia-input" type="file" accept="image/*,video/*,audio/*" multiple>
          <p role="status" aria-live="polite"></p>
          <ul data-role="list"></ul>
        </section>

        <div class="component-section">
      </div>
    </section>

        <div class="component-section">
  </main>
        </div>

  <script src="../../js/axiom.js"></script>
</body>
</html>
