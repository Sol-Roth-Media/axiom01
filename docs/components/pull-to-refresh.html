<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pull to Refresh - Axiom01</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/doc-styles.css">
</head>
<body class="axiom-body">
  <main class="content">
    <section>
      <div class="container">
        <h1>Pull to Refresh</h1>
        <p>Drag down from the top edge to request a content refresh.</p>
        <section class="pullrefresh" data-component="pullrefresh" aria-label="Pull to refresh demo">
          <output aria-live="polite">Pull to refresh</output>
          <section data-role="surface" tabindex="0" aria-label="Refresh surface">
            <h2>Feed</h2>
            <p>Drag down and release after the threshold to trigger refresh feedback.</p>
            <p>The indicator uses transform-based motion for subtle animation.</p>
            <p>Refresh events dispatch as <code>axiom:refresh</code> for app integration.</p>
          </section>
        </section>
      </div>
    </section>
  </main>
  <script src="../../js/axiom.js"></script>
</body>
</html>
