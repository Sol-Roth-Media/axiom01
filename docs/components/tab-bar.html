<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Bar Component – Axiom01 Documentation</title>
  <link rel="stylesheet" href="../../css/axiom.css">
</head>
<body>
  <article>
    <header>
      <h1>Tab Bar Component</h1>
      <p>Horizontal navigation tabs for switching between different views or sections with accessibility support.</p>
    </header>
    <main>
      <section>
        <h2>Basic Tab Bar Example</h2>
        <nav role="tablist" aria-label="Main sections">
          <button role="tab" aria-selected="true" aria-controls="home-panel" id="home-tab">Home</button>
          <button role="tab" aria-selected="false" aria-controls="search-panel" id="search-tab">Search</button>
          <button role="tab" aria-selected="false" aria-controls="profile-panel" id="profile-tab">Profile</button>
          <button role="tab" aria-selected="false" aria-controls="settings-panel" id="settings-tab">Settings</button>
        </nav>
        <section>
          <div role="tabpanel" aria-labelledby="home-tab" id="home-panel">
            <h2>Home Content</h2>
            <p>Welcome to the home section.</p>
          </div>
          <div role="tabpanel" aria-labelledby="search-tab" id="search-panel" hidden>
            <h2>Search</h2>
            <p>Search functionality here.</p>
          </div>
          <div role="tabpanel" aria-labelledby="profile-tab" id="profile-panel" hidden>
            <h2>Profile</h2>
            <p>User profile information.</p>
          </div>
          <div role="tabpanel" aria-labelledby="settings-tab" id="settings-panel" hidden>
            <h2>Settings</h2>
            <p>Application settings.</p>
          </div>
        </section>
      </section>
    </main>
  </article>
</body>
</html>
