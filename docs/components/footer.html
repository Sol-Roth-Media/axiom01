<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Component – Axiom01 Documentation</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/prism.css">
  <link rel="stylesheet" href="../css/docs.css">
</head>
<body>
  <article>
    <header>
      <h1>Footer Component</h1>
      <p>Site footer with links, contact information, and accessibility features for consistent page endings.</p>
    </header>
    <main>
      <section>
        <h2>Basic Footer Example</h2>
        <footer role="contentinfo">
          <nav aria-label="Footer navigation">
            <ul>
              <li><a href="/about">About Us</a></li>
              <li><a href="/careers">Careers</a></li>
              <li><a href="/press">Press</a></li>
              <li><a href="/help">Help Center</a></li>
              <li><a href="/contact">Contact</a></li>
              <li><a href="/privacy">Privacy Policy</a></li>
            </ul>
          </nav>
          <section>
            <p>&copy; 2025 Company Name. All rights reserved.</p>
            <nav aria-label="Social links">
              <a href="#" aria-label="Follow us on Twitter"><span aria-hidden="true">🐦</span></a>
              <a href="#" aria-label="Follow us on LinkedIn"><span aria-hidden="true">💼</span></a>
            </nav>
          </section>
        </footer>
      </section>
    </main>
  </article>
</body>
</html>
