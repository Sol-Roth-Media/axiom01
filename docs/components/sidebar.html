<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Component – Axiom01 Documentation</title>
  <link rel="stylesheet" href="../../css/axiom.css">
  <link rel="stylesheet" href="../../css/prism.css">
  <link rel="stylesheet" href="../css/docs.css">
</head>
<body>
  <article>
    <header>
      <h1>Sidebar Component</h1>
      <p>Navigation and supplementary content panels with responsive behavior and accessibility support.</p>
    </header>
    <main>
      <section>
        <h2>Basic Sidebar Example</h2>
        <div>
          <aside role="complementary" aria-label="Navigation sidebar">
            <nav role="navigation">
              <ul>
                <li><a href="/dashboard" aria-current="page">Dashboard</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/team">Team</a></li>
              </ul>
            </nav>
          </aside>
          <main role="main">
            <h1>Main Content Area</h1>
            <p>Primary content goes here.</p>
          </main>
        </div>
      </section>
      <section>
        <h2>Collapsible Sidebar Example</h2>
        <aside role="complementary" aria-label="Collapsible navigation">
          <button aria-expanded="false" aria-controls="sidebar-nav">☰ <span class="sr-only">Toggle sidebar</span></button>
          <nav id="sidebar-nav" role="navigation">
            <ul>
              <li><a href="/dashboard">Dashboard</a></li>
              <li><a href="/projects">Projects</a></li>
              <li><a href="/team">Team</a></li>
            </ul>
          </nav>
        </aside>
      </section>
    </main>
  </article>
</body>
</html>
